<!-- Syfx Platform — How It Works subpage (full demo dashboard, standalone) -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>How It Works | Syfx</title>
<link rel="stylesheet" href="./styles.css" />
<style>
  /* ---- Kit-local neutral-dark surfaces (no navy / no blue) ---- */
  :root {
    --k-page: #08090C;
    --k-surface: #0C0F14;
    --k-card: #10141B;
    --k-card-2: #0E1218;
    --k-border: rgba(255,255,255,0.07);
    --k-border-strong: rgba(255,255,255,0.10);
    --k-mint-border: rgba(0,229,160,0.28);
    --k-mint-tint: rgba(0,229,160,0.09);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; overflow-x: clip; }
  html { scrollbar-width: none; -ms-overflow-style: none; }
  html::-webkit-scrollbar { width: 0; height: 0; display: none; }
  body {
    background: var(--k-page);
    color: var(--text-secondary);
    font-family: var(--font-sans);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  a { color: inherit; text-decoration: none; }
  ::selection { background: rgba(0,229,160,0.25); color: #fff; }

  /* ===== NAV ===== */
  .nav {
    position: sticky; top: 0; z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; padding: 16px 28px;
    background: rgba(8,9,12,0.72);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--k-border);
  }
  .nav-brand { display: flex; align-items: center; gap: 10px; }
  .nav-brand img { height: 24px; width: auto; display: block; }
  .nav-brand b { color: var(--accent-mint); font-size: 19px; font-weight: 800; letter-spacing: -0.01em; }
  .nav-links { display: flex; align-items: center; gap: 28px; }
  .nav-links a { font-size: 14px; font-weight: 500; color: var(--text-secondary); transition: color .18s; }
  .nav-links a:hover { color: #fff; }
  .nav-right { display: flex; align-items: center; gap: 16px; }
  .nav-login { font-size: 14px; font-weight: 600; color: var(--text-secondary); }
  .nav-login:hover { color: #fff; }
  .nav-getstarted { display: inline-flex; align-items: center; justify-content: center; padding: 0 16px; height: 38px;
    border-radius: 10px; border: 1px solid var(--k-border); color: var(--text-secondary); font-size: 13.5px; font-weight: 600;
    transition: border-color .18s, color .18s, background .18s; white-space: nowrap; }
  .nav-getstarted:hover { border-color: var(--k-mint-border); color: var(--accent-mint); background: var(--k-mint-tint); }
  .nav-burger { display: none; background: none; border: none; color: #fff; cursor: pointer; padding: 6px; z-index: 60; position: relative; }
  .nav-overlay { display: none; }

  /* ===== HOW IT WORKS SUBPAGE HERO ===== */
  .hiw-hero { position: relative; z-index: 3; max-width: 720px; margin: 0 auto; text-align: center; padding: 64px 24px 8px; }
  .hiw-h1 { font-size: clamp(32px, 5vw, 52px); font-weight: 800; line-height: 1.06; letter-spacing: -0.02em; color: #fff; margin: 18px 0 0; }
  .hiw-h1 .mint { color: var(--accent-mint); }
  .hiw-sub { font-size: clamp(15px, 2vw, 17px); line-height: 1.6; color: var(--text-secondary); margin: 16px auto 0; max-width: 560px; }
  @media (max-width: 560px) { .hiw-hero { padding: 48px 20px 4px; } }

  /* ===== HERO ===== */
  .hero { position: relative; overflow: hidden; padding: 84px 24px 0; text-align: center; }
  .hero-inner { position: relative; z-index: 2; max-width: 820px; margin: 0 auto; }
  .hero h1 {
    font-size: clamp(38px, 6.4vw, 68px); font-weight: 800; line-height: 1.04;
    letter-spacing: -0.025em; color: #fff; margin: 22px 0 0;
    text-wrap: balance;
  }
  .hero h1 .mint { color: var(--accent-mint); }
  .hero p.sub {
    max-width: 560px; margin: 22px auto 0; font-size: clamp(15px, 2.2vw, 18px);
    line-height: 1.6; color: var(--text-secondary);
  }
  .hero-cta { display: flex; align-items: center; justify-content: center; gap: 14px; margin-top: 34px; flex-wrap: wrap; }
  .hero-trust { display: flex; align-items: center; justify-content: center; gap: 14px; margin-top: 26px; flex-wrap: wrap;
    font-size: 13px; color: var(--text-secondary); }
  .hero-trust .sep { color: var(--accent-mint); }

  /* arc glow — spans full viewport width, curves up through the hero like a horizon */
  .arc-wrap { position: absolute; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
  .arc-glow {
    position: absolute; left: 50%; top: 300px; transform: translateX(-50%);
    width: 185vw; min-width: 1700px; aspect-ratio: 1 / 1; border-radius: 50%;
    border: 1.5px solid rgba(0,229,160,0.55);
    box-shadow: 0 0 100px 14px rgba(0,229,160,0.20), inset 0 0 90px rgba(0,229,160,0.09);
    -webkit-mask-image: radial-gradient(130% 95% at 50% -8%, #000 52%, rgba(0,0,0,0.5) 72%, transparent 100%);
            mask-image: radial-gradient(130% 95% at 50% -8%, #000 52%, rgba(0,0,0,0.5) 72%, transparent 100%);
  }
  .arc-blob {
    position: absolute; left: 50%; top: 120px; transform: translateX(-50%);
    width: min(900px, 90vw); height: 440px; border-radius: 50%;
    background: radial-gradient(ellipse at center, rgba(0,229,160,0.18) 0%, transparent 70%);
    filter: blur(50px);
    animation: arcpulse 8s var(--ease-standard) infinite;
  }
  @keyframes arcpulse { 0%,100% { opacity: .85; } 50% { opacity: 1; } }

  /* ===== DASHBOARD PREVIEW ===== */
  .dash-stage { position: relative; z-index: 3; padding: 56px 16px 96px; perspective: 1800px; }
  /* dash keeps its FULL desktop layout always; .dash-fit scales it down to fit narrow screens */
  .dash-fit { margin: 0 auto; }
  .dash {
    width: 1180px; height: 684px; display: grid; grid-template-columns: 214px 1fr;
    background: var(--k-surface); border: 1px solid var(--k-border-strong);
    border-radius: 18px; overflow: hidden;
    box-shadow: 0 -10px 60px rgba(0,229,160,0.06), 0 40px 90px rgba(0,0,0,0.55);
    transform-origin: top left;
  }
  /* sidebar */
  .side { border-right: 1px solid var(--k-border); padding: 18px 14px; display: flex; flex-direction: column; gap: 4px; overflow-y: auto; }
  .side-brand { display: flex; align-items: center; gap: 9px; padding: 6px 8px 18px; }
  .side-brand img { height: 22px; }
  .side-brand b { color: var(--accent-mint); font-weight: 800; font-size: 16px; }
  .side-sec { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); padding: 14px 10px 6px; }
  .nav-item { display: flex; align-items: center; gap: 11px; padding: 9px 10px; border-radius: 10px;
    font-size: 14px; font-weight: 500; color: var(--text-secondary); cursor: pointer; transition: background .16s, color .16s; }
  .nav-item:hover { background: rgba(255,255,255,0.04); color: #fff; }
  .nav-item.active { background: var(--k-mint-tint); color: var(--accent-mint); }
  .nav-item.active svg { color: var(--accent-mint); }
  .nav-item svg { color: var(--text-muted); flex-shrink: 0; }
  /* main */
  .main { padding: 18px 24px 14px; min-width: 0; height: 684px; overflow: hidden; }
  .conv::-webkit-scrollbar, .side::-webkit-scrollbar, .tbl-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
  .conv::-webkit-scrollbar-thumb, .side::-webkit-scrollbar-thumb, .tbl-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 8px; }
  .conv::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }
  .greet-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .greet h3 { margin: 0; font-size: 19px; font-weight: 700; color: #fff; }
  .greet p { margin: 4px 0 0; font-size: 13.5px; color: var(--text-secondary); }
  .greet-tools { display: flex; align-items: center; gap: 10px; }
  .search {
    display: flex; align-items: center; gap: 8px; height: 38px; padding: 0 13px;
    background: var(--k-card-2); border: 1px solid var(--k-border); border-radius: 10px;
    color: var(--text-muted); font-size: 13px; min-width: 190px;
  }
  .icon-btn { width: 38px; height: 38px; display: grid; place-items: center; background: var(--k-card-2);
    border: 1px solid var(--k-border); border-radius: 10px; color: var(--text-secondary); cursor: pointer; }
  .icon-btn:hover { color: var(--accent-mint); border-color: var(--k-mint-border); }
  .avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--accent-mint); color: #09090B;
    display: grid; place-items: center; font-weight: 800; font-size: 14px; }

  .live-pill { display: inline-flex; align-items: center; gap: 7px; margin-top: 14px; padding: 6px 12px;
    background: var(--k-mint-tint); border: 1px solid var(--k-mint-border); border-radius: 50px;
    font-size: 12px; font-weight: 600; color: var(--accent-mint); }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-mint);
    animation: syfx-blink 1.6s var(--ease-standard) infinite; }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-top: 18px; }
  .stat { background: var(--k-card); border: 1px solid var(--k-border); border-radius: 14px; padding: 16px; }
  .stat-ico { width: 38px; height: 38px; border-radius: 10px; background: var(--k-mint-tint);
    border: 1px solid var(--k-mint-border); display: grid; place-items: center; color: var(--accent-mint); margin-bottom: 14px; }
  .stat-label { font-size: 12px; color: var(--text-muted); }
  .stat-val { font-size: 26px; font-weight: 800; color: #fff; letter-spacing: -0.02em; margin: 3px 0 8px; }
  .stat-delta { font-size: 12px; font-weight: 600; color: var(--accent-green); }
  .stat-delta span { color: var(--text-muted); font-weight: 500; margin-left: 6px; }

  .lower { display: grid; grid-template-columns: 1.7fr 1fr; gap: 14px; margin-top: 14px; }
  .panel { background: var(--k-card); border: 1px solid var(--k-border); border-radius: 14px; }
  .panel-head { display: flex; align-items: center; justify-content: space-between; padding: 13px 18px 11px; }
  .panel-head h4 { margin: 0; font-size: 14.5px; font-weight: 700; color: #fff; }
  .panel-head a { font-size: 12.5px; font-weight: 600; color: var(--accent-mint); display: inline-flex; align-items: center; gap: 5px; }
  .trade { display: flex; align-items: center; gap: 12px; padding: 12px 18px; border-top: 1px solid var(--k-border); }
  .trade-pair { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; }
  .trade-dot { width: 30px; height: 30px; border-radius: 9px; background: var(--k-mint-tint); color: var(--accent-mint);
    display: grid; place-items: center; font-family: var(--font-mono); font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .trade-name { font-size: 13.5px; font-weight: 600; color: #fff; }
  .trade-side { font-size: 11.5px; color: var(--text-muted); font-family: var(--font-mono); }
  .verified { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 600; color: var(--accent-green);
    white-space: nowrap; }
  .trade-pnl { font-size: 13px; font-weight: 700; color: var(--accent-mint); font-family: var(--font-mono); width: 56px; text-align: right; }
  .trade-time { font-size: 11.5px; color: var(--text-muted); width: 50px; text-align: right; }

  .promo { background: var(--k-card); border: 1px solid var(--k-mint-border); border-radius: 14px; padding: 18px;
    position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; }
  .promo::after { content: ''; position: absolute; right: -40px; bottom: -60px; width: 200px; height: 200px; border-radius: 50%;
    background: radial-gradient(circle, rgba(0,229,160,0.18), transparent 70%); filter: blur(20px); }
  .promo h4 { margin: 0; font-size: 17px; font-weight: 800; color: #fff; line-height: 1.25; position: relative; }
  .promo h4 .mint { color: var(--accent-mint); }
  .promo p { margin: 8px 0 0; font-size: 13px; color: var(--text-secondary); line-height: 1.5; position: relative; }
  .promo-cta { position: relative; margin-top: 16px; align-self: flex-start; display: inline-flex; align-items: center; gap: 7px;
    padding: 9px 16px; background: var(--accent-mint); color: #09090B; font-weight: 700; font-size: 13px; border-radius: 50px; cursor: pointer; }

  .main-chat { padding: 0; height: 684px; overflow: hidden; }

  /* ===== TRADE VIEW ===== */
  .mkt-head { display: flex; align-items: center; gap: 22px; flex-wrap: wrap;
    padding-bottom: 12px; border-bottom: 1px solid var(--k-border); }
  .mkt-sel { display: flex; align-items: center; gap: 11px; background: none; border: none; cursor: pointer; padding: 0; }
  .mkt-price { padding-left: 4px; }
  .mkt-stats { display: flex; gap: 26px; margin-left: auto; }
  .ms-l { font-size: 11px; color: var(--text-muted); }
  .ms-v { font-size: 13px; font-weight: 700; color: #fff; font-family: var(--font-mono); margin-top: 2px; }
  .mkt-zk { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; color: var(--accent-mint);
    background: var(--k-mint-tint); border: 1px solid var(--k-mint-border); padding: 6px 11px; border-radius: 50px; }

  .tradewrap { display: grid; grid-template-columns: 1fr 268px; gap: 14px; margin-top: 10px; }
  .chart-panel { background: var(--k-card); border: 1px solid var(--k-border); border-radius: 14px; overflow: hidden;
    display: flex; flex-direction: column; }
  .chart-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px;
    border-bottom: 1px solid var(--k-border); }
  .tf-row { display: flex; gap: 4px; }
  .tf { padding: 5px 10px; border-radius: 7px; font-size: 12px; font-weight: 600; color: var(--text-muted); cursor: pointer; font-family: var(--font-mono); }
  .tf:hover { color: #fff; }
  .tf.on { background: var(--k-mint-tint); color: var(--accent-mint); }
  .tool-row { display: flex; gap: 12px; color: var(--text-muted); }
  .tool-row svg { cursor: pointer; }
  .tool-row svg:hover { color: var(--accent-mint); }
  .chart-canvas-wrap { position: relative; width: 100%; height: 266px; }
  .chart-canvas-wrap canvas { position: absolute; inset: 0; }

  /* live fills ticker — thin strip of just-verified trades scrolling in over the chart */
  .fills-ticker { display: flex; align-items: center; gap: 9px; height: 30px; padding: 0 14px;
    border-bottom: 1px solid var(--k-border); overflow: hidden; }
  .fills-ticker .live-dot { flex-shrink: 0; }
  .fills-row { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; font-size: 12px;
    color: var(--text-secondary); opacity: 0; transform: translateY(4px);
    transition: opacity .25s var(--ease-standard), transform .25s var(--ease-standard); white-space: nowrap; }
  .fills-row.in { opacity: 1; transform: none; }
  .fills-row b { color: #fff; font-weight: 600; }
  .fills-side { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); }
  .fills-verified { margin-left: auto; font-size: 10px; font-weight: 600; letter-spacing: 0.04em;
    text-transform: uppercase; color: var(--accent-mint); }

  .order { background: var(--k-card); border: 1px solid var(--k-border); border-radius: 14px; padding: 14px; }
  .ls-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; background: var(--k-card-2);
    border: 1px solid var(--k-border); border-radius: 10px; padding: 4px; }
  .ls { padding: 9px; border: none; border-radius: 7px; background: transparent; cursor: pointer;
    font-family: var(--font-sans); font-size: 13px; font-weight: 700; color: var(--text-muted); transition: all .15s; }
  .ls.long.on { background: var(--accent-mint); color: #09090B; }
  .ls.short.on { background: #FF5C6C; color: #09090B; }
  .otabs { display: flex; gap: 16px; margin: 14px 2px 4px; border-bottom: 1px solid var(--k-border); }
  .otab { background: none; border: none; padding: 0 0 9px; cursor: pointer; font-family: var(--font-sans);
    font-size: 12.5px; font-weight: 600; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .otab.on { color: #fff; border-bottom-color: var(--accent-mint); }
  .ofield { display: block; margin-top: 14px; }
  .ofield > span { font-size: 12px; color: var(--text-muted); }
  .ofield-in { display: flex; align-items: center; justify-content: space-between; margin-top: 7px;
    background: var(--k-card-2); border: 1px solid var(--k-border); border-radius: 10px; padding: 11px 13px; }
  .ofield-in b { color: #fff; font-size: 16px; font-family: var(--font-mono); }
  .ofield-in .unit { font-size: 12px; color: var(--text-muted); font-weight: 600; }
  .lev-row { margin-top: 14px; }
  .lev-row input[type=range] { height: 4px; }
  .orows { margin-top: 14px; display: flex; flex-direction: column; gap: 9px; }
  .orow { display: flex; align-items: center; justify-content: space-between; font-size: 12.5px; }
  .orow span { color: var(--text-muted); }
  .orow b { color: #fff; font-weight: 600; }
  .zk-note { display: flex; gap: 9px; align-items: flex-start; margin-top: 16px; padding: 10px 12px;
    background: var(--k-mint-tint); border: 1px solid var(--k-mint-border); border-radius: 10px;
    font-size: 11.5px; line-height: 1.4; color: var(--accent-mint); }
  .zk-note svg { flex-shrink: 0; margin-top: 1px; }
  /* live 3-step ZK verification gate — Syfx's signature "alive proof" moment */
  .zk-live { margin-top: 14px; padding: 9px 12px; background: var(--k-mint-tint);
    border: 1px solid var(--k-mint-border); border-radius: 10px; }
  .zk-live-row { display: flex; gap: 12px; margin-bottom: 7px; }
  .zk-dot { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 600;
    color: var(--text-muted); font-family: var(--font-mono); transition: color .3s; }
  .zk-dot.active, .zk-dot.done { color: var(--accent-mint); }
  .zk-dot-i { width: 7px; height: 7px; border-radius: 50%; border: 1.5px solid var(--text-muted); display: inline-block; flex-shrink: 0; }
  .zk-dot.active .zk-dot-i { border-color: var(--accent-mint); background: var(--accent-mint);
    animation: syfx-blink .9s var(--ease-standard) infinite; }
  .zk-live-msg { display: flex; align-items: center; gap: 7px; font-size: 11.5px; line-height: 1.35; color: var(--accent-mint); }
  .zk-live-msg svg { flex-shrink: 0; }
  .order-btn { width: 100%; margin-top: 14px; height: 46px; border: none; border-radius: 12px; cursor: pointer;
    background: var(--accent-mint); color: #09090B; font-family: var(--font-sans); font-size: 14px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; gap: 8px; transition: background .15s; }
  .order-btn:hover { background: var(--accent-mint-dim); }
  .order-btn.short { background: #FF5C6C; }

  /* positions table */
  .ptabs { display: flex; gap: 18px; }
  .ptab { font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
  .ptab.on { color: #fff; }
  .ptab em { font-style: normal; font-size: 10px; background: var(--k-mint-tint); color: var(--accent-mint);
    padding: 1px 6px; border-radius: 20px; font-family: var(--font-mono); }
  .tbl-scroll { overflow-x: auto; }
  .ptable, .mtable { width: 100%; border-collapse: collapse; min-width: 560px; }
  .ptable th, .mtable th { text-align: left; font-size: 11px; font-weight: 500; color: var(--text-muted);
    padding: 9px 18px; border-top: 1px solid var(--k-border); white-space: nowrap; }
  .ptable td, .mtable td { padding: 7px 18px; border-top: 1px solid var(--k-border); font-size: 13px; color: var(--text-secondary); white-space: nowrap; }
  .pm { color: #fff; font-weight: 600; }
  .pside { font-size: 10.5px; font-weight: 700; padding: 2px 7px; border-radius: 5px; margin-left: 4px; }
  .pside.l { background: var(--k-mint-tint); color: var(--accent-mint); }
  .pside.s { background: rgba(255,92,108,0.12); color: #FF5C6C; }
  .u, .unit { color: var(--text-muted); font-size: 11px; }
  .trade-go { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; color: var(--accent-mint); cursor: pointer; }

  /* ===== SYFX AI CHAT ===== */
  .chat { display: grid; grid-template-columns: 210px 1fr; grid-template-rows: 100%; height: 684px; }
  .threads { border-right: 1px solid var(--k-border); padding: 14px 12px; display: flex; flex-direction: column; gap: 3px; }
  .new-thread { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 10px;
    background: var(--k-mint-tint); border: 1px solid var(--k-mint-border); color: var(--accent-mint);
    font-family: var(--font-sans); font-size: 13px; font-weight: 600; cursor: pointer; }
  .th-sec { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); padding: 16px 10px 6px; }
  .thread { display: flex; align-items: center; gap: 9px; padding: 9px 10px; border-radius: 9px; font-size: 13px;
    color: var(--text-secondary); cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .thread svg { flex-shrink: 0; color: var(--text-muted); }
  .thread:hover { background: rgba(255,255,255,0.04); color: #fff; }
  .thread.on { background: rgba(255,255,255,0.05); color: #fff; }
  .conv-wrap { display: flex; flex-direction: column; min-width: 0; min-height: 0; height: 100%; }
  .conv { flex: 1; min-height: 0; overflow-y: auto; padding: 22px 24px; display: flex; flex-direction: column; gap: 18px; }
  .msg { display: flex; gap: 11px; max-width: 100%; }

  .msg .bubble { font-size: 14px; line-height: 1.6; }

  .msg.ai .bubble { color: var(--text-secondary); max-width: 88%; padding-top: 5px; }

  .msg.ai .bubble code { font-family: var(--font-mono); font-size: 12.5px; background: var(--k-card);
    border: 1px solid var(--k-border); padding: 1px 6px; border-radius: 5px; color: var(--accent-mint); }
  .ai-ava { width: 30px; height: 30px; border-radius: 9px; background: var(--k-mint-tint); border: 1px solid var(--k-mint-border);
    display: grid; place-items: center; flex-shrink: 0; }
  .ai-ava img { height: 16px; }
  .u-ava { width: 30px; height: 30px; border-radius: 50%; background: var(--accent-mint); color: #09090B;
    display: grid; place-items: center; font-size: 12px; font-weight: 800; flex-shrink: 0; }
  .sent-chip { display: inline-flex; align-items: center; gap: 7px; font-size: 11px; font-weight: 600; color: var(--accent-mint);
    background: var(--k-mint-tint); border: 1px solid var(--k-mint-border); padding: 4px 10px; border-radius: 50px; }
  /* advisory card */
  .adv-card { background: var(--k-card); border: 1px solid var(--k-mint-border); border-radius: 14px; padding: 16px; max-width: 380px; width: 100%; }
  .adv-top { display: flex; align-items: center; justify-content: space-between; }
  .adv-tag { display: inline-flex; align-items: center; gap: 7px; font-size: 10.5px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--accent-mint); }
  .adv-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px 14px; margin: 16px 0; }
  .adv-grid > div { display: flex; flex-direction: column; gap: 3px; }
  .adv-grid span { font-size: 11px; color: var(--text-muted); }
  .adv-grid b { font-size: 14px; color: #fff; font-weight: 700; }
  .adv-proofs { display: flex; gap: 7px; flex-wrap: wrap; padding-top: 14px; border-top: 1px solid var(--k-border); }
  .pchk { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; color: var(--accent-green);
    background: var(--accent-green-tint); border: 1px solid rgba(34,197,94,0.25); padding: 4px 9px; border-radius: 50px; }
  .adv-btns { display: flex; gap: 9px; margin-top: 14px; }
  .adv-approve { flex: 1; height: 40px; border: none; border-radius: 10px; background: var(--accent-mint); color: #09090B;
    font-family: var(--font-sans); font-size: 13px; font-weight: 700; cursor: pointer; }
  .adv-approve:hover { background: var(--accent-mint-dim); }
  .adv-decline { height: 40px; padding: 0 16px; border-radius: 10px; background: transparent; border: 1px solid var(--k-border);
    color: var(--text-secondary); font-family: var(--font-sans); font-size: 13px; font-weight: 600; cursor: pointer; }
  .adv-decline:hover { border-color: var(--text-muted); color: #fff; }
  /* glassmorphic result card (profit / loss) */
  .result-card { position: relative; overflow: hidden; max-width: 360px; width: 100%;
    background: rgba(0,229,160,0.07); -webkit-backdrop-filter: blur(16px); backdrop-filter: blur(16px);
    border: 1px solid rgba(0,229,160,0.32); border-radius: 16px; padding: 18px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06); }
  .result-card.loss { background: rgba(255,92,108,0.06); border-color: rgba(255,92,108,0.30); }
  .rc-glow { position: absolute; width: 220px; height: 220px; right: -60px; top: -80px; border-radius: 50%;
    background: radial-gradient(circle, rgba(0,229,160,0.38), transparent 70%); filter: blur(26px); pointer-events: none; }
  .result-card.loss .rc-glow { background: radial-gradient(circle, rgba(255,92,108,0.30), transparent 70%); }
  .rc-top { position: relative; display: flex; align-items: center; justify-content: space-between; }
  .rc-badge { font-size: 10.5px; font-weight: 700; letter-spacing: 0.08em; color: var(--accent-mint);
    background: rgba(0,229,160,0.14); border: 1px solid rgba(0,229,160,0.3); padding: 4px 10px; border-radius: 50px; }
  .result-card.loss .rc-badge { color: #FF5C6C; background: rgba(255,92,108,0.12); border-color: rgba(255,92,108,0.3); }
  .rc-pnl { position: relative; font-family: var(--font-mono); font-size: 34px; font-weight: 800; margin-top: 14px;
    letter-spacing: -0.02em; color: var(--accent-mint); }
  .result-card.loss .rc-pnl { color: #FF5C6C; }
  .rc-amt { position: relative; font-family: var(--font-mono); font-size: 14px; color: #fff; margin-top: 2px; }
  .rc-amt span { color: var(--text-muted); font-size: 11px; margin-left: 7px; font-family: var(--font-sans); }
  .rc-grid { position: relative; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 16px 0 14px; }
  .rc-grid > div { display: flex; flex-direction: column; gap: 3px; }
  .rc-grid span { font-size: 10.5px; color: var(--text-muted); }
  .rc-grid b { font-size: 13px; color: #fff; font-family: var(--font-mono); font-weight: 600; }
  .rc-receipt { position: relative; display: flex; align-items: center; gap: 6px; padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.10); font-size: 11px; color: var(--text-secondary); }
  .rc-receipt code { font-family: var(--font-mono); color: var(--accent-mint); }
  .result-card.loss .rc-receipt code { color: #FF5C6C; }
  /* rulebook card */
  .rule-card { max-width: 330px; width: 100%; background: var(--k-card); border: 1px solid var(--k-mint-border);
    border-radius: 14px; padding: 14px 16px; }
  .rule-head { display: flex; align-items: center; gap: 7px; font-size: 10.5px; font-weight: 700; letter-spacing: 0.08em;
    color: var(--accent-mint); margin-bottom: 12px; }
  .rule-lines { display: flex; flex-direction: column; gap: 7px; font-family: var(--font-mono); font-size: 12.5px; }
  .rule-lines .rk { color: var(--text-muted); }
  .rule-lines .rv { color: var(--accent-mint); }
  /* composer */
  .composer { border-top: 1px solid var(--k-border); padding: 14px 18px 16px; background: var(--k-surface); }
  .comp-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .model-sel { display: inline-flex; align-items: center; gap: 7px; background: var(--k-card); border: 1px solid var(--k-border);
    border-radius: 50px; padding: 6px 12px; font-family: var(--font-sans); font-size: 12px; font-weight: 600; color: #fff; cursor: pointer; }
  .comp-globe { width: 32px; height: 32px; display: grid; place-items: center; border-radius: 9px; background: var(--k-card);
    border: 1px solid var(--k-border); color: var(--text-muted); cursor: pointer; }
  .comp-globe:hover { color: var(--accent-mint); }
  /* live chat bar */
  .comp-bar { display: flex; align-items: center; gap: 8px; background: var(--k-card); border: 1px solid var(--k-border);
    border-radius: 14px; padding: 6px 6px 6px 4px; transition: border-color .18s; }
  .comp-bar.on { cursor: text; }
  .comp-bar:focus-within { border-color: var(--k-mint-border); box-shadow: 0 0 0 3px rgba(0,229,160,0.08); }
  .comp-bar input { flex: 1; min-width: 0; background: none; border: none; outline: none; color: #fff;
    font-family: var(--font-sans); font-size: 14px; padding: 12px 12px; }
  .comp-bar input::placeholder { color: var(--text-muted); }
  .typed-line { flex: 1; min-width: 0; padding: 12px 12px; font-size: 14px; color: #fff; font-family: var(--font-sans);
    min-height: 22px; white-space: pre-wrap; word-break: break-word; }
  .caret { display: inline-block; width: 2px; height: 16px; background: var(--accent-mint); margin-left: 1px;
    vertical-align: -3px; animation: caretblink 1.05s steps(1) infinite; }
  @keyframes caretblink { 50% { opacity: 0; } }
  .send-btn { width: 38px; height: 38px; border: none; border-radius: 11px; background: var(--accent-mint); color: #09090B;
    display: grid; place-items: center; cursor: pointer; flex-shrink: 0; transition: opacity .15s, background .15s; }
  .send-btn:hover { background: var(--accent-mint-dim); }
  .send-btn:disabled { opacity: 0.4; cursor: default; }
  .comp-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .cchip { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 600; color: var(--text-secondary);
    background: var(--k-card); border: 1px solid var(--k-border); padding: 6px 11px; border-radius: 50px; cursor: pointer; }
  .cchip:hover { border-color: var(--accent-mint); color: var(--accent-mint); }
  /* typing indicator */
  .typing { display: inline-flex; align-items: center; gap: 5px; background: var(--k-card); border: 1px solid var(--k-border);
    border-radius: 16px 16px 16px 4px; padding: 14px 16px; }
  .typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); animation: tdot 1.2s infinite ease-in-out; }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .30s; }
  @keyframes tdot { 0%, 60%, 100% { transform: translateY(0); opacity: .35; } 30% { transform: translateY(-5px); opacity: 1; } }

  /* ===== ZK PROOFS ===== */
  .proofs { margin-top: 18px; display: flex; flex-direction: column; gap: 10px; }
  .proof-row { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; background: var(--k-card);
    border: 1px solid var(--k-border); border-radius: 14px; padding: 16px 18px; }
  .proof-row:hover { border-color: var(--k-mint-border); }
  .proof-main { min-width: 150px; }
  .proof-id { font-size: 14px; font-weight: 700; color: #fff; }
  .proof-checks { display: flex; gap: 7px; flex-wrap: wrap; }
  .proof-anchor { margin-left: auto; display: flex; flex-direction: column; gap: 3px; text-align: right; }

  /* ===== LOGOS STRIP ===== */
  .strip { text-align: center; padding: 8px 24px 56px; }
  .strip p { font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); margin: 0 0 22px; }
  .strip-row { display: flex; align-items: center; justify-content: center; gap: 14px; flex-wrap: wrap; }
  .chip { padding: 8px 16px; border: 1px solid var(--k-border); border-radius: 50px; font-size: 13px; color: var(--text-secondary);
    transition: border-color .18s, color .18s; cursor: default; }
  .chip:hover { border-color: var(--accent-mint); color: var(--accent-mint); }

  /* ===== SHARED SECTION SCAFFOLD ===== */
  .sec { max-width: 1320px; margin: 0 auto; padding: 84px 24px; }
  .sec-head { text-align: center; max-width: 680px; margin: 0 auto 52px; }
  .sec-label { display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--accent-mint); margin-bottom: 16px; }
  .sec-h2 { font-size: clamp(28px, 4vw, 42px); font-weight: 800; line-height: 1.08; letter-spacing: -0.02em;
    color: #fff; margin: 0; text-wrap: balance; }
  .sec-h2 .mint { color: var(--accent-mint); }
  .sec-sub { font-size: clamp(15px, 2vw, 17px); line-height: 1.6; color: var(--text-secondary); margin: 22px auto 0; max-width: 560px; }

  /* ===== FEATURE BENTO (Farside-style) ===== */
  /* ===== shared feature card ===== */
  .feat { background: var(--k-card); border: 1px solid var(--k-border); border-radius: 16px; padding: 24px;
    display: flex; flex-direction: column; gap: 12px; transition: border-color .2s, transform .2s; }
  .feat:hover { border-color: var(--k-mint-border); transform: translateY(-3px); }
  .feat-ico { width: 42px; height: 42px; border-radius: 11px; background: var(--k-mint-tint); border: 1px solid var(--k-mint-border);
    display: grid; place-items: center; color: var(--accent-mint); flex-shrink: 0; }
  .feat h4 { margin: 0; font-size: 17px; font-weight: 700; color: #fff; }
  .feat p { margin: 0; font-size: 13.5px; line-height: 1.55; color: var(--text-secondary); }

  /* ===== PROBLEM ===== */
  .prob-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .prob-card { background: var(--k-card); border: 1px solid var(--k-border); border-radius: 16px; padding: 28px;
    transition: border-color .2s; }
  .prob-card:hover { border-color: var(--k-mint-border); }
  .prob-num { font-family: var(--font-mono); font-size: 12px; font-weight: 700; color: var(--accent-mint); letter-spacing: 0.06em; margin-bottom: 16px; }
  .prob-card h4 { margin: 0 0 12px; font-size: 19px; font-weight: 700; color: #fff; line-height: 1.25; }
  .prob-card p { margin: 0; font-size: 14px; line-height: 1.6; color: var(--text-secondary); }

  /* ===== SOLUTION + EXECUTION FLOW ===== */
  .sol { display: grid; grid-template-columns: 1fr 1fr; gap: 56px; align-items: center; }
  .sol-left .sec-label { margin-bottom: 16px; }
  .sol-h2 { font-size: clamp(28px, 3.8vw, 40px); font-weight: 800; line-height: 1.1; letter-spacing: -0.02em; color: #fff; margin: 0 0 32px; }
  .sol-h2 .mint { color: var(--accent-mint); }
  .sol-points { display: flex; flex-direction: column; gap: 24px; }
  .sol-point { display: flex; gap: 16px; }
  .sol-ico { width: 44px; height: 44px; border-radius: 11px; background: var(--k-mint-tint); border: 1px solid var(--k-mint-border);
    display: grid; place-items: center; color: var(--accent-mint); flex-shrink: 0; }
  .sol-point h4 { margin: 0 0 8px; font-size: 16px; font-weight: 700; color: #fff; }
  .sol-point p { margin: 0; font-size: 13.5px; line-height: 1.55; color: var(--text-secondary); }
  .flow-card { background: var(--k-card); border: 1px solid var(--k-border); border-radius: 18px; padding: 8px 22px 22px;
    box-shadow: 0 30px 70px rgba(0,0,0,0.4); }
  .flow-head { font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted);
    padding: 20px 0 8px; }
  .flow-step { display: flex; align-items: center; gap: 16px; padding: 15px 0; border-bottom: 1px solid var(--k-border); }
  .flow-num { width: 28px; height: 28px; border-radius: 50%; background: var(--k-mint-tint); border: 1px solid var(--accent-mint);
    color: var(--accent-mint); display: grid; place-items: center; font-family: var(--font-mono); font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .flow-t { font-size: 14px; font-weight: 600; color: #fff; }
  .flow-s { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .flow-callout { background: var(--accent-mint-tint-05); border: 1px solid var(--k-mint-border); border-radius: 12px; padding: 14px 16px; margin-top: 18px; }
  .fc-pass { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: var(--accent-mint); }
  .fc-fail { font-size: 12px; color: var(--text-muted); margin-top: 6px; padding-left: 22px; }

  /* ===== HOW IT WORKS TIMELINE ===== */
  .timeline { max-width: 760px; margin: 0 auto; }
  .tl-step { display: grid; grid-template-columns: 56px 1fr; gap: 22px; }
  .tl-rail { display: flex; flex-direction: column; align-items: center; }
  .tl-ico { width: 56px; height: 56px; border-radius: 14px; background: var(--k-mint-tint); border: 1px solid var(--k-mint-border);
    display: grid; place-items: center; color: var(--accent-mint); flex-shrink: 0; }
  .tl-line { width: 2px; flex: 1; min-height: 20px; margin: 8px 0; background: linear-gradient(to bottom, var(--accent-mint), transparent); opacity: 0.3; }
  .tl-body { padding-bottom: 36px; min-width: 0; }
  .tl-label { font-family: var(--font-mono); font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent-mint); }
  .tl-body h4 { margin: 8px 0 12px; font-size: 20px; font-weight: 700; color: #fff; line-height: 1.2; }
  .tl-body > p { margin: 0; font-size: 14.5px; line-height: 1.6; color: var(--text-secondary); max-width: 560px; }
  .tl-code { margin-top: 16px; max-width: 440px; background: var(--k-page); border: 1px solid var(--k-border); border-radius: 12px;
    padding: 16px 18px; font-family: var(--font-mono); font-size: 13px; line-height: 1.85; }
  .tl-code .ck { color: var(--text-secondary); }
  .tl-code .cv { color: var(--accent-mint); }
  .tl-proofs { margin-top: 16px; display: flex; flex-direction: column; gap: 10px; max-width: 460px; }
  .tl-proof { display: flex; align-items: center; gap: 12px; background: var(--k-card); border: 1px solid var(--k-border); border-radius: 12px; padding: 12px 14px; }
  .tl-pico { width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center; flex-shrink: 0; }
  .tl-pico.green { background: var(--accent-green-tint); color: var(--accent-green); border: 1px solid rgba(34,197,94,0.3); }
  .tl-pico.mint { background: var(--k-mint-tint); color: var(--accent-mint); border: 1px solid var(--k-mint-border); }
  .tl-proof b { display: block; font-size: 13.5px; font-weight: 600; color: #fff; }
  .tl-proof span { font-size: 12px; color: var(--text-muted); }
  /* advisory callout */
  .advisory { max-width: 760px; margin: 16px auto 0; background: var(--k-card); border: 1px solid var(--k-mint-border); border-radius: 16px; padding: 28px 30px; }
  .adv-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .adv-lbl { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent-mint); }
  .advisory h4 { margin: 0 0 14px; font-size: 19px; font-weight: 700; color: #fff; }
  .adv-code { background: var(--k-page); border: 1px solid var(--k-border); border-radius: 10px; padding: 14px 16px;
    font-family: var(--font-mono); font-size: 13px; line-height: 1.6; color: var(--accent-mint); margin-bottom: 14px; }
  .advisory > p { margin: 0; font-size: 14px; line-height: 1.6; color: var(--text-secondary); }

  /* ===== FEATURES — grid (desktop) / 3D auto-slide carousel (phones) ===== */
  .feat-rail { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .feat-dots { display: none; }
  .fd { width: 7px; height: 7px; border-radius: 50%; border: none; padding: 0; cursor: pointer;
    background: var(--k-border-strong); transition: background .2s, width .2s, transform .2s; }
  .fd.on { background: var(--accent-mint); width: 20px; border-radius: 5px; }

  /* ===== MARKETS ===== */
  .chains-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; max-width: 820px; margin: 0 auto; }
  .chain-tok { display: inline-flex; align-items: center; gap: 9px; padding: 11px 18px; background: var(--k-card);
    border: 1px solid var(--k-border); border-radius: 12px; font-size: 14px; font-weight: 600; color: var(--text-secondary);
    transition: border-color .18s, color .18s, transform .18s; }
  .chain-tok:hover { border-color: var(--accent-mint); color: #fff; transform: translateY(-2px); }
  .chain-tok .cdot { width: 22px; height: 22px; border-radius: 6px; display: grid; place-items: center;
    font-family: var(--font-mono); font-size: 10px; font-weight: 700; background: var(--k-mint-tint); color: var(--accent-mint); }
  .chain-tok.infra { background: var(--k-mint-tint); border-color: var(--k-mint-border); color: var(--accent-mint); }
  .chains-note { text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 30px; }

  /* ===== DEPTH: glass surfaces + radial mint glow + scroll reveal ===== */
  body { background:
      radial-gradient(60% 38% at 50% 5%, rgba(0,229,160,0.07), transparent 70%),
      radial-gradient(48% 30% at 88% 26%, rgba(0,229,160,0.05), transparent 70%),
      radial-gradient(44% 30% at 8% 60%, rgba(0,196,135,0.045), transparent 70%),
      radial-gradient(50% 34% at 70% 92%, rgba(0,229,160,0.05), transparent 70%),
      var(--k-page); }
  .sec { position: relative; }
  .prob-card, .feat, .cred-card {
    background: linear-gradient(160deg, rgba(255,255,255,0.04), rgba(255,255,255,0.006)), var(--k-card);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 16px 40px rgba(0,0,0,0.35); }
  .prob-card:hover, .feat:hover, .cred-card:hover {
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 24px 56px rgba(0,0,0,0.45), 0 0 44px rgba(0,229,160,0.10); }
  /* section reveal — direction varies per section (set in app.jsx) */
  .reveal { opacity: 0; will-change: opacity, transform;
    transition: opacity .85s cubic-bezier(0.16,1,0.3,1), transform .85s cubic-bezier(0.16,1,0.3,1); }
  .reveal.rv-up    { transform: translateY(60px); }
  .reveal.rv-left  { transform: translateX(-72px); }
  .reveal.rv-right { transform: translateX(72px); }
  .reveal.rv-zoom  { transform: scale(0.86); }
  .reveal.rv-tiltL { transform: perspective(1300px) rotateY(12deg) translateX(-50px); transform-origin: left center; }
  .reveal.rv-tiltR { transform: perspective(1300px) rotateY(-12deg) translateX(50px); transform-origin: right center; }
  .reveal.in { opacity: 1; transform: none; }
  /* staggered child entrance — children rise + fade with cascade delays */

    border: 1px solid var(--k-mint-border); display: grid; place-items: center; color: var(--accent-mint); transition: transform .22s, box-shadow .22s; }

  .faq-list { max-width: 820px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
  .faq-item { border: 1px solid var(--k-border); border-radius: 14px; overflow: hidden; transition: border-color .2s, background .2s;

  .faq-item.open { border-color: var(--k-mint-border); }
  .faq-q { display: flex; align-items: center; justify-content: space-between; gap: 16px; width: 100%; text-align: left;

  .faq-q .chev { flex-shrink: 0; color: var(--accent-mint); display: inline-flex; transition: transform .25s; }
  .faq-item.open .faq-q .chev { transform: rotate(45deg); }
  .faq-a { overflow: hidden; transition: max-height .3s ease; }
  .faq-a p { margin: 0; padding: 0 24px 20px; font-size: 14.5px; line-height: 1.65; color: var(--text-secondary); max-width: 680px; }

  /* ===== WAITLIST CTA — Syfx split "boarding pass" card ===== */
  .wl { position: relative; overflow: hidden; padding: 96px 24px; }

  .wl-card { position: relative; max-width: 1320px; margin: 0 auto; display: grid; grid-template-columns: 1.15fr 0.85fr;
    gap: 0; border-radius: 24px; overflow: hidden; isolation: isolate;
    background: linear-gradient(150deg, rgba(0,229,160,0.06), rgba(255,255,255,0.012) 40%, transparent), var(--k-card);
    border: 1px solid var(--k-mint-border);

  .wl-left { position: relative; z-index: 1; padding: 60px 56px; }

  .wl-note { font-size: 14px; line-height: 1.75; color: var(--text-secondary); margin: 14px 0 30px; max-width: 470px; text-wrap: pretty; }
  .wl-pills { display: flex; flex-wrap: wrap; gap: 9px; }

    border: 1px solid var(--k-mint-border); border-radius: 50px; font-size: 12.5px; font-weight: 500; color: var(--accent-mint); }
  .wl-form { display: flex; flex-direction: column; gap: 12px; }
  .wl-form input { width: 100%; height: 56px; padding: 0 20px; background: var(--k-page); border: 1px solid var(--k-border);
    border-radius: 13px; color: #fff; font-family: var(--font-sans); font-size: 15.5px; outline: none; transition: border-color .18s, box-shadow .18s; }
  .wl-form input::placeholder { color: var(--text-muted); }
  .wl-form input:focus { border-color: var(--accent-mint); box-shadow: 0 0 0 3px rgba(0,229,160,0.12); }
  .wl-form button { width: 100%; border-radius: 13px !important; }
  .wl-consent { display: flex; align-items: flex-start; gap: 10px; margin-top: 16px; padding: 0; background: none; border: none;
    text-align: left; font-family: var(--font-sans); font-size: 13px; line-height: 1.45; color: var(--text-secondary); cursor: pointer; }
  .wl-consent .cbox { flex-shrink: 0; width: 18px; height: 18px; border-radius: 5px; border: 1px solid var(--k-border-strong);
    display: grid; place-items: center; color: #09090B; transition: background .15s, border-color .15s; margin-top: 1px; }
  .wl-consent.on .cbox { background: var(--accent-mint); border-color: var(--accent-mint); }
  .wl-consent:hover .cbox { border-color: var(--accent-mint); }
  .wl-fine { font-size: 13px; color: var(--text-muted); margin: 18px 0 0; }
  .wl-fine b { color: var(--text-secondary); font-family: var(--font-mono); }
  /* success — spans the whole card */
  .wl-success { position: relative; z-index: 1; grid-column: 1 / -1; text-align: center; padding: 56px 32px; }
  .wl-success .tick { width: 60px; height: 60px; border-radius: 50%; background: var(--k-mint-tint); border: 2px solid var(--accent-mint);
    display: grid; place-items: center; color: var(--accent-mint); margin: 0 auto 18px; box-shadow: 0 0 36px rgba(0,229,160,0.25); }
  .wl-success h3 { margin: 0; font-size: 26px; font-weight: 800; color: var(--accent-mint); letter-spacing: -0.01em; }
  .wl-success p { margin: 10px 0 20px; font-size: 15px; color: var(--text-secondary); line-height: 1.5; }
  .wl-success .pos { font-size: 13px; color: var(--text-muted); margin-top: 18px; }

  .wl-share { display: flex; gap: 10px; justify-content: center; }

    font-size: 13px; font-weight: 600; cursor: pointer; transition: border-color .18s, color .18s; }
  .wl-share button:hover { border-color: var(--accent-mint); color: var(--accent-mint); }

  /* ===== FOOTER ===== */
  .foot { position: relative; border-top: 1px solid var(--k-border); background: var(--k-surface); overflow: hidden; }
  .foot-top { position: relative; z-index: 1; max-width: 1320px; margin: 0 auto; padding: 64px 24px 36px;
    display: grid; grid-template-columns: 1.5fr 2fr; gap: 48px; }
  .foot-brand .row { display: flex; align-items: center; gap: 9px; }
  .foot-brand img { height: 22px; }
  .foot-brand b { color: var(--accent-mint); font-weight: 800; font-size: 18px; }
  .foot-brand p { font-size: 14px; line-height: 1.6; color: var(--text-muted); margin: 16px 0 20px; max-width: 320px; }
  .foot-social { display: flex; gap: 10px; }
  .foot-social a { width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--k-border); display: grid; place-items: center;
    color: var(--text-secondary); transition: border-color .18s, color .18s, background .18s; }
  .foot-social a:hover { border-color: var(--accent-mint); color: var(--accent-mint); background: var(--k-mint-tint); }
  .foot-links { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; }
  .foot-col h5 { font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin: 0 0 16px; }
  .foot-col a { display: block; font-size: 14px; color: var(--text-secondary); margin-bottom: 12px; transition: color .18s; width: fit-content; }
  .foot-col a:hover { color: var(--accent-mint); }
  .foot-bar { position: relative; z-index: 1; max-width: 1320px; margin: 0 auto; padding: 20px 24px; border-top: 1px solid var(--k-border);
    display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; }
  .foot-disc { font-size: 12.5px; color: var(--text-muted); }
  .foot-bar-right { display: flex; align-items: center; gap: 20px; }
  .foot-bar-right a, .foot-bar-right span { font-size: 12.5px; color: var(--text-muted); transition: color .18s; }
  .foot-bar-right a:hover { color: var(--accent-mint); }
  /* big wordmark watermark, mint metallic — fully visible, gently bleeding */
  .foot-mark { position: relative; z-index: 0; text-align: center; margin: 6px 0 0; padding: 0 0 16px;
    font-family: var(--font-sans); font-weight: 900; font-size: clamp(78px, 18vw, 240px); line-height: 1.05;
    letter-spacing: -0.04em; user-select: none; pointer-events: none; overflow: hidden;
    background: linear-gradient(180deg, rgba(0,229,160,0.22) 0%, rgba(0,229,160,0.10) 55%, rgba(0,229,160,0.04) 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    -webkit-text-fill-color: transparent; }

  /* ===== RESPONSIVE =====
     The marketing chrome (nav, hero, strip) reflows fluidly.
     The DASHBOARD keeps its full desktop layout and is scaled down by JS
     (see app.jsx) so it reads like the real product, just smaller. */
  @media (max-width: 820px) {
    .nav-links { display: none; }
    .nav-login { display: none; }
    .nav-getstarted { display: none; }
    .nav-burger { display: inline-flex; }
    .nav-overlay {
      position: fixed; inset: 0; z-index: 55; display: flex; flex-direction: column; gap: 26px;
      align-items: center; justify-content: center; padding: 24px;
      background: rgba(8,9,12,0.98); -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
      opacity: 0; visibility: hidden; transform: translateY(-8px);
      transition: opacity .28s ease, transform .28s ease, visibility .28s;
    }
    .nav-overlay.open { opacity: 1; visibility: visible; transform: none; }
    .nav-overlay a { font-size: 22px; font-weight: 700; color: #fff; }
    .nav-overlay a:hover { color: var(--accent-mint); }
    .nav-overlay button { width: 220px; margin-top: 10px; }
    .hero { padding-top: 60px; }
    .dash-stage { padding: 44px 14px 72px; }
    .sec { padding: 60px 22px; }
    .prob-grid { grid-template-columns: 1fr; }
    .sol { grid-template-columns: 1fr; gap: 36px; }
    .adv2 { grid-template-columns: 1fr; gap: 36px; }
    .feat-rail { grid-template-columns: 1fr 1fr; }
    .cred-grid { grid-template-columns: 1fr; }
    .foot-top { grid-template-columns: 1fr; gap: 32px; }
  }
  /* waitlist card stacks for tablet + below (tablet preview is 834px) */
  @media (max-width: 900px) {
    .wl { padding: 64px 20px; }
    .wl-card { grid-template-columns: 1fr; max-width: 600px; }
    .wl-right { border-left: none; border-top: 1px dashed var(--k-mint-border); }
    .wl-left, .wl-right { padding: 40px 40px; }
    .wl-lead, .wl-note { max-width: 100%; }
  }
  @media (max-width: 640px) {
    /* features become a smooth horizontal carousel — auto-slides + swipeable */
    .feat-rail { display: flex; grid-template-columns: none; gap: 14px; overflow-x: auto; overflow-y: visible;
      scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; scrollbar-width: none;
      padding: 24px 0 28px; }
    .feat-rail::-webkit-scrollbar { display: none; }
    .feat-rail > .feat { flex: 0 0 80%; scroll-snap-align: center;
      will-change: transform, opacity; transition: transform .35s cubic-bezier(0.22,1,0.36,1), opacity .35s ease; }
    .feat-rail > .feat:first-child { margin-left: 10%; }
    .feat-rail > .feat:last-child { margin-right: 10%; }
    .feat-dots { display: flex; justify-content: center; gap: 8px; margin-top: 6px; }
  }
  @media (max-width: 560px) {
    .dash-stage { padding: 32px 10px 60px; }
    .feat { padding: 20px; border-radius: 16px; gap: 11px; }
    .sec-head { margin-bottom: 36px; }
    .auto-toggle { width: 100%; }
    .auto-tab { flex: 1; padding: 11px 10px; font-size: 12.5px; }
    .tl-step { grid-template-columns: 44px 1fr; gap: 16px; }
    .tl-ico { width: 44px; height: 44px; }
    .cred-card { padding: 20px; gap: 14px; }
    .cred-statement { padding: 28px 22px; margin-top: 32px; }
    .wl { padding: 48px 16px; }
    .wl-form { flex-direction: column; }
    .wl-form input { width: 100%; }
    .wl-card { grid-template-columns: 1fr; }
    .wl-right { border-left: none; border-top: 1px dashed var(--k-mint-border); }
    .wl-left, .wl-right { padding: 30px 24px; }
    .foot-links { grid-template-columns: 1fr 1fr; gap: 22px; }
    .foot-bar { flex-direction: column; align-items: flex-start; gap: 10px; }
  }
  /* ===== SPLASH SCREEN ===== */
  #app { opacity: 0; visibility: hidden; transition: opacity .8s cubic-bezier(0.16,1,0.3,1), visibility 0s linear .8s; }
  #app.ready { opacity: 1; visibility: visible; transition: opacity .8s cubic-bezier(0.16,1,0.3,1), visibility 0s linear 0s; }
  #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; max-height: 820px; z-index: 9999; display: grid; place-items: center; overflow: hidden;
    isolation: isolate; background-color: var(--k-page);
    background-image:
      radial-gradient(60% 50% at 50% 38%, rgba(0,229,160,0.10), transparent 70%);
    transition: opacity .6s ease, visibility 0s linear .6s; }
  #splash.hide { opacity: 0; visibility: hidden; }
  .splash-inner { position: absolute; top: 300px; left: 50%; transform: translate(-50%,-50%); display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .splash-logo { width: 78px; height: 78px; border-radius: 22px; background: var(--k-mint-tint);
    border: 1px solid var(--k-mint-border); display: grid; place-items: center;
    box-shadow: 0 0 50px rgba(0,229,160,0.22); animation: splashPop .7s cubic-bezier(0.16,1,0.3,1) both, splashBob 3s ease-in-out 0.7s infinite; }
  .splash-logo img { height: 40px; }
  .splash-word { font-family: var(--font-sans); font-weight: 800; font-size: 26px; letter-spacing: -0.01em;
    color: #fff; opacity: 0; animation: splashFade .6s ease 0.25s both; }
  .splash-word::after { content: ''; }
  .splash-bar { width: 150px; height: 3px; border-radius: 3px; background: rgba(255,255,255,0.08); overflow: hidden;
    opacity: 0; animation: splashFade .5s ease 0.4s both; }
  .splash-bar span { display: block; height: 100%; width: 40%; border-radius: 3px;
    background: linear-gradient(90deg, transparent, var(--accent-mint), transparent);
    animation: splashLoad 1.1s ease-in-out infinite; }
  @keyframes splashPop { from { opacity: 0; transform: scale(0.7) translateY(8px); } to { opacity: 1; transform: none; } }
  @keyframes splashBob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  @keyframes splashFade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  @keyframes splashLoad { 0% { transform: translateX(-120%); } 100% { transform: translateX(370%); } }
  @media (prefers-reduced-motion: reduce) {
    .splash-logo, .splash-word, .splash-bar, .splash-bar span { animation: none; opacity: 1; }
    #app { transition: none; }
  }
</style>
